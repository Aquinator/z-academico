name: CI

on:
  push:
    branches: [develop, 'feature/**', 'release/**']
  pull_request:
    branches: [develop, main]

jobs:
  # ── auth-service ─────────────────────────────────────────
  auth-service:
    name: auth-service — lint / test / audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/auth-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --coverage --ci

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: auth-coverage
          path: services/auth-service/coverage/

      - name: Security audit
        run: npm audit --audit-level=high

  # ── academic-service ─────────────────────────────────────
  academic-service:
    name: academic-service — lint / test / audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/academic-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/academic-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --coverage --ci

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: academic-coverage
          path: services/academic-service/coverage/

      - name: Security audit
        run: npm audit --audit-level=high

  # ── Docker build check ───────────────────────────────────
  docker-build:
    name: Docker build verification
    runs-on: ubuntu-latest
    needs: [auth-service, academic-service]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build auth-service image
        uses: docker/build-push-action@v5
        with:
          context: services/auth-service
          push: false
          tags: z-academico/auth-service:ci
          target: production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build academic-service image
        uses: docker/build-push-action@v5
        with:
          context: services/academic-service
          push: false
          tags: z-academico/academic-service:ci
          target: production
          cache-from: type=gha
          cache-to: type=gha,mode=max