name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/z-academico

jobs:
  # ── Versão semântica automática ──────────────────────────
  version:
    name: Generate semantic version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate tag
        id: tag
        run: |
          # Busca a última tag; se nao houver nenhuma, comeca em v0.0.0
          LAST=$(git tag --sort=-version:refname | grep '^v' | head -n1)
          if [ -z "$LAST" ]; then
            LAST="v0.0.0"
          fi

          MAJOR=$(echo "$LAST" | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo "$LAST" | cut -d. -f2)
          PATCH=$(echo "$LAST" | cut -d. -f3)

          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Tag anterior: $LAST"
          echo "Nova tag: $NEW_TAG"

  # ── Build e push das imagens ─────────────────────────────
  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push auth-service
        uses: docker/build-push-action@v5
        with:
          context: services/auth-service
          push: true
          target: production
          tags: |
            ${{ env.IMAGE_PREFIX }}-auth-service:latest
            ${{ env.IMAGE_PREFIX }}-auth-service:${{ needs.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push academic-service
        uses: docker/build-push-action@v5
        with:
          context: services/academic-service
          push: true
          target: production
          tags: |
            ${{ env.IMAGE_PREFIX }}-academic-service:latest
            ${{ env.IMAGE_PREFIX }}-academic-service:${{ needs.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Tag no repositório ───────────────────────────────────
  tag-release:
    name: Tag release
    runs-on: ubuntu-latest
    needs: [version, build-push]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create and push git tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.version.outputs.tag }}
          git push origin ${{ needs.version.outputs.tag }}

  # ── Deploy no Railway ─────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [version, build-push]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Verificar autenticacao Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway whoami

      - name: Redeploy auth-service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway redeploy --service auth-service --yes

      - name: Redeploy academic-service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway redeploy --service academic-service --yes

      - name: Aguardar containers reiniciarem
        run: sleep 25

      - name: Health check pos-deploy — auth-service
        run: |
          curl -f --retry 5 --retry-delay 10 --retry-connrefused \
            "${{ secrets.RAILWAY_AUTH_SERVICE_URL }}/health"

      - name: Health check pos-deploy — academic-service
        run: |
          curl -f --retry 5 --retry-delay 10 --retry-connrefused \
            "${{ secrets.RAILWAY_ACADEMIC_SERVICE_URL }}/health"

      - name: Summary
        run: |
          echo "## Deploy concluido" >> $GITHUB_STEP_SUMMARY
          echo "- Versao: ${{ needs.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- Imagens publicadas no Docker Hub" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy disparado no Railway (auth-service e academic-service)" >> $GITHUB_STEP_SUMMARY
          echo "- Health checks confirmados em ambos os servicos" >> $GITHUB_STEP_SUMMARY