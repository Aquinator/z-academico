global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    project: 'z-academico'

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:3001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'academic-service'
    static_configs:
      - targets: ['academic-service:3002']
    metrics_path: '/metrics'
    scrape_interval: 10s