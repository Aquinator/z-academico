upstream auth_service {
    server auth-service:3001;
}

upstream academic_service {
    server academic-service:3002;
}

server {
    listen 80;
    server_name _;

    # Logs estruturados
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;

    # Health do próprio gateway
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"gateway","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
    }

    # Rotas de autenticação
    location /auth/ {
        rewrite ^/auth/(.*)$ /$1 break;
        proxy_pass http://auth-service:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Rotas acadêmicas
    location /academic/ {
        rewrite ^/academic/(.*)$ /$1 break;
        proxy_pass http://academic-service:3002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 404 para rotas desconhecidas
    location / {
        return 404 '{"success":false,"message":"Rota não encontrada no gateway"}';
        add_header Content-Type application/json;
    }
}