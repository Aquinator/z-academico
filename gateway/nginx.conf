upstream auth_service {
    server auth-service:3001;
}

upstream academic_service {
    server academic-service:3002;
}

server {
    listen 80;
    server_name _;

    # Logs estruturados
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;

    # Health do próprio gateway
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"gateway","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
    }

    # Rotas de autenticação
    location /auth/ {
        proxy_pass         http://auth_service;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Rotas acadêmicas
    location /academic/ {
        proxy_pass         http://academic_service/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # 404 para rotas desconhecidas
    location / {
        return 404 '{"success":false,"message":"Rota não encontrada no gateway"}';
        add_header Content-Type application/json;
    }
}